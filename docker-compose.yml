version: '3.8'

x-shared-environment: &shared-environment
  DATABASE_URL: postgresql://reconny:reconny123@postgres:5432/reconny
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-key-here}
  AI_BASE_URL: ${AI_BASE_URL:-https://api.opencode.dev/v1}
  AI_MODEL: ${AI_MODEL:-deepseek-v4-flash-free}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:8000"]}
  SUBFINDER_PATH: /usr/local/bin/subfinder
  HTTPX_PATH: /usr/local/bin/httpx
  KATANA_PATH: /usr/local/bin/katana
  NUCLEI_PATH: /usr/local/bin/nuclei
  GAU_PATH: /usr/local/bin/gau
  STORAGE_PATH: /app/storage/jobs

services:
  postgres:
    image: postgres:15-alpine
    container_name: reconny-postgres
    environment:
      POSTGRES_USER: reconny
      POSTGRES_PASSWORD: reconny123
      POSTGRES_DB: reconny
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reconny
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconny"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reconny-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - reconny
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconny-backend
    ports:
      - "8000:8000"
    environment: *shared-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
      - log_data:/app/logs
    networks:
      - reconny
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconny-worker
    environment: *shared-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
      - log_data:/app/logs
    networks:
      - reconny
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=pipeline,stages,ai
      --max-tasks-per-child=100
      --prefetch-multiplier=1
      --without-gossip
      --without-mingle
    healthcheck:
      test: ["CMD-SHELL", "grep -q celery /proc/1/cmdline || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  worker-low:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconny-worker-low
    environment: *shared-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
      - log_data:/app/logs
    networks:
      - reconny
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=default
      --max-tasks-per-child=50
      --prefetch-multiplier=1
    healthcheck:
      test: ["CMD-SHELL", "grep -q celery /proc/1/cmdline || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: reconny-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - reconny
    restart: unless-stopped

  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconny-migration
    environment: *shared-environment
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/alembic:/app/alembic
    networks:
      - reconny
    command: >
      sh -c "alembic upgrade head && echo 'Migrations completed'"
    restart: no

networks:
  reconny:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
  log_data: